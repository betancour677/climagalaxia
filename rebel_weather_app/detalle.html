<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <title>Detalle - Rebel Weather</title>
</head>

<body class="bg-light text-dark">

  <!-- Navbar Responsivo (Minimal) -->
  <!-- Navbar Responsivo (Minimal) -->
  <header class="app-clima__encabezado">
    <nav class="app-clima__navbar navbar navbar-expand-lg navbar-light">
      <div class="container">
        <a class="app-clima__marca navbar-brand" href="index.html">REBEL WEATHER</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navDetail">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div id="navDetail" class="collapse navbar-collapse">
          <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
            <li class="nav-item"><a class="nav-link text-secondary" href="about.html">Acerca</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Contenido Principal -->
  <main class="app-clima__principal container">

    <!-- Título de la localidad -->
    <h1 id="nombrePlaneta" class="display-3 font-weight-bold text-center mb-5">Cargando...</h1>

    <!-- Tarjeta de detalle principal -->
    <div class="row justify-content-center mb-5">
      <article class="col-12 col-md-8 col-lg-6">
        <div class="tarjeta-detalle">
          <div id="iconoPlaneta" class="tarjeta-detalle__icono"></div>
          <p class="tarjeta-detalle__temperatura" id="temperaturaPlaneta"></p>
          <p class="tarjeta-detalle__estado" id="estadoPlaneta"></p>

          <!-- Descripción Humorística -->
          <p class="tarjeta-detalle__humor" id="humorPlaneta"></p>

          <div class="tarjeta-detalle__estadisticas">
            <div class="tarjeta-detalle__estadistica">
              <small class="tarjeta-detalle__estadistica-etiqueta">HUMEDAD</small>
              <span id="humedadPlaneta" class="tarjeta-detalle__estadistica-valor">--%</span>
            </div>
            <div class="tarjeta-detalle__estadistica">
              <small class="tarjeta-detalle__estadistica-etiqueta">VIENTO</small>
              <span id="vientoPlaneta" class="tarjeta-detalle__estadistica-valor">-- km/h</span>
            </div>
          </div>
        </div>
      </article>
    </div>

    <!-- Guía de Supervivencia -->
    <section class="mb-5">
      <div class="tarjeta-supervivencia">
        <div class="tarjeta-supervivencia__contenido">
          <div class="tarjeta-supervivencia__icono">🎒</div>
          <div>
            <h4 class="tarjeta-supervivencia__titulo">Guía de Supervivencia Rebelde</h4>
            <p class="tarjeta-supervivencia__texto" id="consejoSupervivencia">Cargando consejo...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Pronóstico Semanal -->
    <section>
      <h3 class="h5 font-weight-bold text-center text-muted mb-4 text-uppercase tracking-amplio">Próximos 7 días</h3>
      <div id="pronostico" class="row justify-content-center">
        <!-- Se llenará con JS -->
      </div>
    </section>

    <div class="text-center mt-5">
      <a href="index.html" class="btn btn-dark px-5 py-2 rounded-pill">← Volver</a>
    </div>

  </main>

  <footer class="app-clima__pie container">
    <hr class="mb-4">
    <div class="text-center">
      <p class="app-clima__pie-texto mb-1">© Rebel Alliance Systems</p>
      <p class="app-clima__pie-texto">Módulo 3 – App de Clima (Interfaz y Estilos)</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="https://code.jquery.com/jquery-3.6.0.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Scripts propios -->
  <script src="assets/js/data.js"></script>
  <script src="assets/js/script.js"></script>

</body>

</html>
